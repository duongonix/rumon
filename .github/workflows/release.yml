name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for manual runs), e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: rumon
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Verify workspace
        run: |
          cargo fmt --all --check
          cargo check --workspace --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked

  build:
    name: Build ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
          - name: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Rumon
        run: cargo build --release --locked --target ${{ matrix.target }} -p rumon-cli

      - name: Prepare package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          PKG="rumon-${RELEASE_TAG}-${{ matrix.name }}"
          STAGE="$PKG"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$STAGE/"
          [ -f README.md ] && cp README.md "$STAGE/" || true
          [ -f LICENSE ] && cp LICENSE "$STAGE/" || true
          tar -czf "${PKG}.tar.gz" "$STAGE"
          shasum -a 256 "${PKG}.tar.gz" > "${PKG}.sha256"

      - name: Prepare package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "rumon-${env:RELEASE_TAG}-${{ matrix.name }}"
          $stage = Join-Path (Get-Location) $pkg
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" (Join-Path $stage "${env:BIN_NAME}.exe")
          if (Test-Path "README.md") { Copy-Item "README.md" (Join-Path $stage "README.md") }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" (Join-Path $stage "LICENSE") }
          Compress-Archive -Path "$stage\*" -DestinationPath "${pkg}.zip" -Force
          $hash = (Get-FileHash "${pkg}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${pkg}.zip" | Out-File -Encoding ascii "${pkg}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            *.tar.gz
            *.zip
            *.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List dist files
        shell: bash
        run: find dist -maxdepth 3 -type f -print

      - name: Generate checksums manifest
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f -name "*.sha256" -print0 | xargs -0 cat > dist/SHA256SUMS

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true
